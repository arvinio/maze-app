name: maze_app
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  auto_route: ^8.1.3
  get_it: ^7.7.0
  injectable: ^2.4.2
  flutter_svg: ^2.0.10+1
  dio: ^5.4.3+1
  freezed: ^2.5.2
  equatable: ^2.0.5
  pretty_dio_logger: ^1.3.1
  logger: ^2.3.0
  flutter_bloc: ^8.1.5

  cupertino_icons: ^1.0.6
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: ^8.0.0
  injectable_generator: ^2.6.1
  build_runner: ^2.4.10
  json_serializable: ^6.8.0

  flutter_lints: ^3.0.0

flutter:

  uses-material-design: true

  fonts:
    - family: Yekan
      fonts:
        - asset: assets/fonts/yekan_light.ttf
          weight: 300
        - asset: assets/fonts/yekan.ttf
          weight: 400
        - asset: assets/fonts/yekan_medium.ttf
          weight: 500
        - asset: assets/fonts/yekan_bold.ttf
          weight: 700
        - asset: assets/fonts/yekan_extra_bold.ttf
          weight: 800

  assets:
      - assets/images/